<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Espiritual de Paracambi</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
  }

  #lista {
    width: 300px;
    height: 100vh;
    overflow-y: auto;
    padding: 10px;
    background: #f5f5f5;
    border-right: 1px solid #ccc;
  }

  #lista h2 {
    text-align: center;
  }

  .item {
    padding: 8px;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
  }

  .item:hover {
    background: #e6f2ff;
  }

  #map {
    flex: 1;
    height: 100vh;
  }
</style>
</head>

<body>

<div id="lista">
  <h2>Igrejas de Paracambi</h2>
</div>

<div id="map"></div>

<script>
function initMap() {

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: { lat: -22.6068, lng: -43.7113 }
  });

  const geocoder = new google.maps.Geocoder();
  const bounds = new google.maps.LatLngBounds();
  const lista = document.getElementById("lista");

  const igrejas = [
    { nome:"IEADP – Assembleia de Deus", bairro:"Centro", endereco:"R. Afonso Franco, 15, Paracambi - RJ" },
    { nome:"Igreja Batista de Paracambi", bairro:"Centro", endereco:"R. Juiz Emílio Carmo, 61, Paracambi - RJ" },
    { nome:"Congregacional de Paracambi", bairro:"Centro", endereco:"R. Dr. Nilo Peçanha, 222, Paracambi - RJ" },
    { nome:"Povo de Deus do Brasil", bairro:"Centro", endereco:"Tv. Pedro Soares, 17, Paracambi - RJ" },

    { nome:"AD Rua 10", bairro:"Lages", endereco:"R. Dep. Romeu Natal, 1017, Paracambi - RJ" },
    { nome:"AD Ministério de Lages", bairro:"Lages", endereco:"R. Leal de Carvalho, 50, Paracambi - RJ" },
    { nome:"Cristo Vive de Paracambi", bairro:"Lages", endereco:"Estr. RJ-127, 9737, Paracambi - RJ" },

    { nome:"Igreja Batista Guarajuba", bairro:"Guarajuba", endereco:"R. São Jorge, 201, Paracambi - RJ" },

    { nome:"Missão Evangélica do Brasil", bairro:"Sabugo", endereco:"R. Beraldo Sacchi, 955, Paracambi - RJ" },
    { nome:"ADNI Paracambi", bairro:"Sabugo", endereco:"Av. Pres. João Goulart, 248, Paracambi - RJ" }
  ];

  let delay = 0;

  igrejas.forEach((igreja) => {

    setTimeout(() => {

      geocoder.geocode({ address: igreja.endereco }, (results, status) => {

        if (status === "OK") {

          const location = results[0].geometry.location;

          const marker = new google.maps.Marker({
            map,
            position: location,
            title: igreja.nome
          });

          const info = new google.maps.InfoWindow({
            content: `
              <strong>${igreja.nome}</strong><br>
              Bairro: ${igreja.bairro}<br>
              ${igreja.endereco}
            `
          });

          marker.addListener("click", () => info.open(map, marker));

          bounds.extend(location);
          map.fitBounds(bounds);

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `<strong>${igreja.nome}</strong><br><small>${igreja.bairro}</small>`;
          item.onclick = () => {
            map.setZoom(16);
            map.setCenter(location);
            info.open(map, marker);
          };

          lista.appendChild(item);

        } else {
          console.warn("Erro ao localizar:", igreja.nome, status);
        }
      });

    }, delay);

    delay += 600; // evita bloqueio do Google

  });
}
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD6eJ8kIie2pnWqKls4A8UZag3ERuJJ9jY&callback=initMap">
</script>

</body>
</html>
