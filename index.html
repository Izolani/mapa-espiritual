<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Espiritual de Paracambi</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
  }

  #lista {
    width: 280px;
    height: 100vh;
    overflow-y: auto;
    padding: 10px;
    background: #f5f5f5;
    border-right: 1px solid #ccc;
  }

  #lista h2 {
    text-align: center;
  }

  .item {
    padding: 8px;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
  }

  .item:hover {
    background: #e6f2ff;
  }

  #map {
    flex: 1;
    height: 100vh;
  }
</style>
</head>

<body>

<div id="lista">
  <h2>Igrejas de Paracambi</h2>
</div>

<div id="map"></div>

<script>
function initMap() {

  const centroParacambi = { lat: -22.6068, lng: -43.7113 };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: centroParacambi
  });

  const bounds = new google.maps.LatLngBounds();

  const icones = {
    Centro: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
    Lages: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
    Guarajuba: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
    Sabugo: "https://maps.google.com/mapfiles/ms/icons/purple-dot.png",
    Outros: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
  };

  const igrejas = [
    { nome:"IEADP – Assembleia de Deus", bairro:"Centro", lat:-22.6066, lng:-43.7110, endereco:"R. Afonso Franco, 15" },
    { nome:"Igreja Batista de Paracambi", bairro:"Centro", lat:-22.6059, lng:-43.7121, endereco:"R. Juiz Emílio Carmo, 61" },
    { nome:"Congregacional de Paracambi", bairro:"Centro", lat:-22.6071, lng:-43.7108, endereco:"R. Dr. Nilo Peçanha, 222" },
    { nome:"Povo de Deus do Brasil", bairro:"Centro", lat:-22.6060, lng:-43.7100, endereco:"Tv. Pedro Soares, 17" },

    { nome:"AD Rua 10", bairro:"Lages", lat:-22.6285, lng:-43.7212, endereco:"R. Dep. Romeu Natal, 1017" },
    { nome:"AD Ministério de Lages", bairro:"Lages", lat:-22.6270, lng:-43.7200, endereco:"R. Leal de Carvalho, 50" },
    { nome:"Cristo Vive de Paracambi", bairro:"Lages", lat:-22.6320, lng:-43.7250, endereco:"Estr. RJ-127, 9737" },

    { nome:"Igreja Batista Guarajuba", bairro:"Guarajuba", lat:-22.6400, lng:-43.7300, endereco:"R. São Jorge, 201" },

    { nome:"Missão Evangélica do Brasil", bairro:"Sabugo", lat:-22.6179, lng:-43.7425, endereco:"R. Beraldo Sacchi, 955" },
    { nome:"ADNI Paracambi", bairro:"Sabugo", lat:-22.6185, lng:-43.7430, endereco:"Av. Pres. João Goulart, 248" }
  ];

  const lista = document.getElementById("lista");

  igrejas.forEach(igreja => {

    const pos = { lat: igreja.lat, lng: igreja.lng };

    const marker = new google.maps.Marker({
      map,
      position: pos,
      title: igreja.nome,
      icon: icones[igreja.bairro]
    });

    const info = new google.maps.InfoWindow({
      content: `
        <strong>${igreja.nome}</strong><br>
        Bairro: ${igreja.bairro}<br>
        ${igreja.endereco}
      `
    });

    marker.addListener("click", () => {
      info.open(map, marker);
    });

    bounds.extend(pos);

    // Lista lateral
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<strong>${igreja.nome}</strong><br><small>${igreja.bairro}</small>`;

    div.onclick = () => {
      map.setZoom(16);
      map.setCenter(pos);
      info.open(map, marker);
    };

    lista.appendChild(div);
  });

  map.fitBounds(bounds);
}
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD6eJ8kIie2pnWqKls4A8UZag3ERuJJ9jY&callback=initMap">
</script>

</body>
</html>
